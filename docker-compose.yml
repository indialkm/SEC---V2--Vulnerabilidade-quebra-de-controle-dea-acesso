version: "3.9"
services:
  backend:
    build: ./projeto-app-notaFlow-seguro
    ports:
      - "8084:8084"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mariadb://db:3306/db_notaflow
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=senha
      - SERVER_PORT=8084
    depends_on:
      db:
        condition: service_healthy

  db:
    image: mariadb:11
    environment:
      MARIADB_DATABASE: db_notaflow
      MARIADB_ROOT_PASSWORD: senha
    ports:
      - "3309:3306"
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      start_period: 10s
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  dbdata: